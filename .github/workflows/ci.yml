name: CI
on: [push]
jobs:
  build:
    name: Lint and build on Node

    runs-on: ubuntu-latest

    env:
      CI: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Use pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm i

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
